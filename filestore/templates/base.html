<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Sharing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #121212;
            --secondary-color: #1f77d0;
            --accent-color: #42aaff;
            --background-color: #181818;
            --text-color: #f5f5f5;
            --card-color: #222222;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .navbar {
            background-color: var(--primary-color);
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
        }

        .navbar-brand {
            font-size: 1.4rem;
            color: var(--accent-color) !important;
        }

        .nav-link {
            color: var(--text-color) !important;
            margin: 0 8px;
        }

        .nav-link:hover {
            color: var(--accent-color) !important;
            transition: color 0.3s ease-in-out;
        }

        .btn {
            background-color: var(--secondary-color);
            border: none;
            color: var(--text-color);
        }

        .btn:hover {
            background-color: var(--accent-color);
            transition: background-color 0.3s ease-in-out;
        }

        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 0 15px;
        }

        .hero-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        

        .card {
            background-color: var(--card-color);
            color: var(--text-color);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            transition: transform 0.3s ease-in-out;
        }

        .card:hover {
            transform: scale(1.03);
        }

        footer {
            text-align: center;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--text-color);
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">Secure File Sharing</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if 'username' not in session %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('auth.login') }}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('auth.register') }}">Register</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('main.dashboard') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('files.upload') }}">Upload</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('main.view_ledger') }}">Ledger</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('files.shared_files') }}">Shared</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        &copy; 2025 Secure File Sharing | All Rights Reserved
    </footer>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const socket = io();
    </script>
</body>
</html>
